<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>ьё</title>
    <meta
      name="description"
      content="ьё — цифровая колода образов: расклад на три карты и поиск по архиву."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-noise" aria-hidden="true"></div>
    <div class="page-vignette" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="topbar">
        <div class="brand" id="brandHome" role="button" tabindex="0" aria-label="На главную">
          <span class="brand-soft">ь</span><span class="brand-neon">ё</span>
        </div>
      </header>

      <section class="stage" id="stage" aria-live="polite"></section>
      <section class="info-panel" id="infoPanel"></section>

      <footer class="search-dock">
        <div class="search-entry" id="searchEntry" role="button" tabindex="0">
          <span class="search-prompt" id="searchPrompt">поиск по образу или состоянию</span>
          <input
            id="searchInput"
            class="search-input"
            type="search"
            inputmode="search"
            autocomplete="off"
            spellcheck="false"
            placeholder="тишина, ритуал, рыжий свет, миф..."
          />
        </div>
      </footer>
    </main>

    <noscript>
      <div class="noscript-banner">
        Для этой колоды нужен JavaScript: расклад, поиск и озвучка работают на клиентской логике.
      </div>
    </noscript>

    <script type="module" src="./app.js"></script>
  </body>
</html>
