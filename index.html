<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>ьё</title>
    <meta
      name="description"
      content="ьё — колода знаков: три карты и поиск по следам."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=IBM+Plex+Sans:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-noise" aria-hidden="true"></div>
    <div class="page-vignette" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="topbar">
        <div class="brand" id="brandHome" role="button" tabindex="0" aria-label="На главную">
          <span class="brand-soft">ь</span><span class="brand-neon">ё</span>
        </div>
      </header>

      <section class="stage" id="stage" aria-live="polite"></section>
      <section class="info-panel" id="infoPanel"></section>

      <footer class="search-dock">
        <div class="search-entry" id="searchEntry" role="button" tabindex="0">
          <span class="search-prompt" id="searchPrompt">искать знак</span>
          <input
            id="searchInput"
            class="search-input"
            type="search"
            inputmode="search"
            autocomplete="off"
            spellcheck="false"
            placeholder="дым, узел, зверь, алгоритм..."
          />
        </div>
      </footer>
    </main>

    <noscript>
      <div class="noscript-banner">
        Без JavaScript колода молчит.
      </div>
    </noscript>

    <script type="module" src="./app.js"></script>
  </body>
</html>
